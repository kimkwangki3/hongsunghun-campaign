name: APK Build

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare Capacitor project
        run: |
          mkdir -p cap-build/www
          echo '<html><body></body></html>' > cap-build/www/index.html
          cat > cap-build/capacitor.config.json << 'EOF'
          {
            "appId": "com.hongsunghun.campaign",
            "appName": "홍캠프",
            "webDir": "www",
            "server": {
              "url": "https://hongsunghun-campaign.onrender.com",
              "cleartext": false,
              "androidScheme": "https"
            },
            "plugins": {
              "PushNotifications": {
                "presentationOptions": ["badge", "sound", "alert"]
              }
            }
          }
          EOF

      - name: Install Capacitor + Push Notifications
        working-directory: cap-build
        run: |
          npm init -y
          npm install @capacitor/core@5 @capacitor/android@5 @capacitor/cli@5 @capacitor/push-notifications@5

      - name: Add Android platform
        working-directory: cap-build
        run: npx cap add android

      - name: Sync plugins
        working-directory: cap-build
        run: npx cap sync android

      - name: Inject google-services.json (FCM)
        run: |
          cp android-config/google-services.json cap-build/android/app/google-services.json
          echo "✅ google-services.json 복사 완료"

      - name: Apply custom icon
        run: |
          MIPMAP=cap-build/android/app/src/main/res
          rm -rf $MIPMAP/mipmap-anydpi-v26
          for dir in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            mkdir -p $MIPMAP/$dir
          done
          cp frontend/public/icons/icon-72.png  $MIPMAP/mipmap-mdpi/ic_launcher.png
          cp frontend/public/icons/icon-72.png  $MIPMAP/mipmap-hdpi/ic_launcher.png
          cp frontend/public/icons/icon-96.png  $MIPMAP/mipmap-xhdpi/ic_launcher.png
          cp frontend/public/icons/icon-144.png $MIPMAP/mipmap-xxhdpi/ic_launcher.png
          cp frontend/public/icons/icon-192.png $MIPMAP/mipmap-xxxhdpi/ic_launcher.png
          for dir in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            cp $MIPMAP/$dir/ic_launcher.png $MIPMAP/$dir/ic_launcher_round.png 2>/dev/null || true
            rm -f $MIPMAP/$dir/ic_launcher.webp $MIPMAP/$dir/ic_launcher_round.webp
          done

      - name: Set Android target SDK 34 + Add Firebase deps
        run: |
          GRADLE=cap-build/android/app/build.gradle
          sed -i 's/compileSdkVersion [0-9]*/compileSdkVersion 34/' $GRADLE
          sed -i 's/targetSdkVersion [0-9]*/targetSdkVersion 34/' $GRADLE

          # google-services plugin 적용 (맨 위에 추가)
          sed -i '1s/^/apply plugin: "com.google.gms.google-services"\n/' $GRADLE

          # Firebase BOM + FCM 의존성 추가
          cat >> $GRADLE << 'DEPS'

          dependencies {
              implementation platform('com.google.firebase:firebase-bom:32.7.0')
              implementation 'com.google.firebase:firebase-messaging'
          }
          DEPS

          # 프로젝트 build.gradle에 google-services classpath 추가
          PROJ=cap-build/android/build.gradle
          sed -i "/classpath 'com.android.tools.build:gradle/a\\        classpath 'com.google.gms:google-services:4.4.1'" $PROJ

      - name: Configure release signing
        run: |
          cp android-config/hongcamp-release.keystore cap-build/android/app/hongcamp-release.keystore
          cat >> cap-build/android/app/build.gradle << 'GRADLE'

          android.signingConfigs {
              release {
                  storeFile file("hongcamp-release.keystore")
                  storePassword "hongcamp2026"
                  keyAlias "hongcamp"
                  keyPassword "hongcamp2026"
              }
          }
          android.buildTypes.release.signingConfig = android.signingConfigs.release
          android.buildTypes.debug.signingConfig   = android.signingConfigs.release
          GRADLE

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-v4
          restore-keys: gradle-${{ runner.os }}-

      - name: Build APK
        working-directory: cap-build/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2 -Xmx2g

      - uses: actions/upload-artifact@v4
        with:
          name: hongcamp-apk
          path: cap-build/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
