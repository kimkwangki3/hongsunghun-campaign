name: APK Build

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare Capacitor project
        run: |
          mkdir -p cap-build/www
          echo '<html><body></body></html>' > cap-build/www/index.html
          echo '{"appId":"com.hongsunghun.campaign","appName":"홍캠프","webDir":"www","server":{"url":"https://hongsunghun-campaign.onrender.com","cleartext":false,"androidScheme":"https"}}' > cap-build/capacitor.config.json

      - name: Install Capacitor
        working-directory: cap-build
        run: |
          npm init -y
          npm install @capacitor/core@5 @capacitor/android@5 @capacitor/cli@5

      - name: Add Android platform
        working-directory: cap-build
        run: npx cap add android

      - name: Apply custom icon
        run: |
          MIPMAP=cap-build/android/app/src/main/res
          RES=cap-build/android/app/src/main/res

          # adaptive icon 제거 (Android 8+에서 XML 아이콘이 PNG보다 우선함)
          rm -rf $MIPMAP/mipmap-anydpi-v26

          # 각 밀도별 PNG 아이콘 교체
          for dir in mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi mipmap-mdpi; do
            mkdir -p $MIPMAP/$dir
          done
          cp frontend/public/icons/icon-72.png  $MIPMAP/mipmap-hdpi/ic_launcher.png
          cp frontend/public/icons/icon-72.png  $MIPMAP/mipmap-hdpi/ic_launcher_round.png
          cp frontend/public/icons/icon-96.png  $MIPMAP/mipmap-xhdpi/ic_launcher.png
          cp frontend/public/icons/icon-96.png  $MIPMAP/mipmap-xhdpi/ic_launcher_round.png
          cp frontend/public/icons/icon-144.png $MIPMAP/mipmap-xxhdpi/ic_launcher.png
          cp frontend/public/icons/icon-144.png $MIPMAP/mipmap-xxhdpi/ic_launcher_round.png
          cp frontend/public/icons/icon-192.png $MIPMAP/mipmap-xxxhdpi/ic_launcher.png
          cp frontend/public/icons/icon-192.png $MIPMAP/mipmap-xxxhdpi/ic_launcher_round.png
          cp frontend/public/icons/icon-72.png  $MIPMAP/mipmap-mdpi/ic_launcher.png
          cp frontend/public/icons/icon-72.png  $MIPMAP/mipmap-mdpi/ic_launcher_round.png

          # webp 형식 파일도 교체 (Capacitor 5가 webp를 생성하는 경우)
          for dir in mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi mipmap-mdpi; do
            rm -f $MIPMAP/$dir/ic_launcher.webp $MIPMAP/$dir/ic_launcher_round.webp
          done

      - name: Configure release signing
        run: |
          cp android-config/hongcamp-release.keystore cap-build/android/app/hongcamp-release.keystore
          cat >> cap-build/android/app/build.gradle << 'GRADLE'

          android.signingConfigs {
              release {
                  storeFile file("hongcamp-release.keystore")
                  storePassword "hongcamp2026"
                  keyAlias "hongcamp"
                  keyPassword "hongcamp2026"
              }
          }
          android.buildTypes.release.signingConfig = android.signingConfigs.release
          android.buildTypes.debug.signingConfig = android.signingConfigs.release
          GRADLE

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-v3
          restore-keys: gradle-${{ runner.os }}-

      - name: Build APK
        working-directory: cap-build/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2 -Xmx2g

      - uses: actions/upload-artifact@v4
        with:
          name: hongcamp-apk
          path: cap-build/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
