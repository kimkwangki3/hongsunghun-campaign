name: 홍캠프 APK 빌드

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Java 17 설정
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Node.js 20 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Capacitor 빌드 디렉토리 생성
        run: |
          mkdir -p cap-build/www
          echo '<html><body>Loading...</body></html>' > cap-build/www/index.html

      - name: capacitor.config.json 생성
        run: |
          cat > cap-build/capacitor.config.json << 'CAPEOF'
          {
            "appId": "com.hongsunghun.campaign",
            "appName": "홍캠프",
            "webDir": "www",
            "server": {
              "url": "https://hongsunghun-campaign.onrender.com",
              "cleartext": false,
              "androidScheme": "https"
            },
            "android": {
              "allowMixedContent": false,
              "captureInput": true
            }
          }
          CAPEOF

      - name: package.json 생성 및 Capacitor 설치
        working-directory: cap-build
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/android @capacitor/cli

      - name: Android 플랫폼 추가
        working-directory: cap-build
        run: npx cap add android

      - name: APK 빌드
        working-directory: cap-build/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: APK 업로드
        uses: actions/upload-artifact@v4
        with:
          name: 홍캠프-APK
          path: cap-build/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: 완료 메시지
        run: |
          echo "✅ APK 빌드 완료!"
          ls -lh cap-build/android/app/build/outputs/apk/debug/
