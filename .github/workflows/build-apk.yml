name: APK Build

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare Capacitor project
        run: |
          mkdir -p cap-build/www
          echo '<html><body></body></html>' > cap-build/www/index.html
          echo '{"appId":"com.hongsunghun.campaign","appName":"홍캠프","webDir":"www","server":{"url":"https://hongsunghun-campaign.onrender.com","cleartext":false,"androidScheme":"https"}}' > cap-build/capacitor.config.json

      - name: Install Capacitor
        working-directory: cap-build
        run: |
          npm init -y
          npm install @capacitor/core@6 @capacitor/android@6 @capacitor/cli@6

      - name: Add Android platform
        working-directory: cap-build
        run: npx cap add android

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('cap-build/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build APK
        working-directory: cap-build/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --warning-mode=none
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2 -Xmx2g
          JAVA_TOOL_OPTIONS: -Xmx2g

      - uses: actions/upload-artifact@v4
        with:
          name: hongcamp-apk
          path: cap-build/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
