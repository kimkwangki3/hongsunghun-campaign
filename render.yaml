services:
  - type: web
    name: hongsunghun-campaign
    env: node
    region: singapore
    plan: free
    rootDir: .
    buildCommand: npm run build && cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: hongsunghun-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: INVITE_CODE
        value: camp2026
      - key: PORT
        value: 10000

databases:
  - name: hongsunghun-db
    databaseName: campaign
    user: campaign
    plan: free
